<div class="home-hero">
  @if (!registerMode) {
    <div class="hero-card text-center">
      <span class="hero-badge">Full-stack portfolio project</span>
      <h1>Connect with people around you</h1>
      <p class="lead">
        Browse member profiles, like users, exchange messages and see who is online in real time.
      </p>
      <button class="btn btn-primary btn-lg px-4" (click)="registerToggle()">Create account</button>
    </div>
  } @else {
    <div class="row justify-content-center">
      <div class="card shadow-sm border-0 register-card">
        <div class="card-body p-4">
          <app-register (cancelRegister)="cancelRegisterMode($event)"></app-register>
        </div>
      </div>
    </div>
  }
</div>
